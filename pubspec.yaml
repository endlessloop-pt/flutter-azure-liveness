name: flutter_azure_liveness
description: Flutter plugin wrapping the Azure AI Vision Face Liveness UI SDK for iOS and Android.
version: 1.0.5
homepage: https://github.com/endlessloop-pt/flutter-azure-liveness

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.endlessloop.flutter_azure_liveness
        pluginClass: AzureLivenessPlugin
      ios:
        pluginClass: AzureLivenessPlugin
